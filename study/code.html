<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification · StudyHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header class="top-bar">
    <div class="brand-area">
        <span class="brand-icon">🎓</span>
        <span class="brand-name">StudyHub</span>
    </div>
    <nav class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="connexion.html">Connexion</a>
        <a href="inscription.html">Inscription</a>
        <button id="settingsBtn" class="settings-icon"><i class="fas fa-sliders-h"></i></button>
    </nav>
</header>
<div id="settingsPanel" class="settings-panel hidden">
    <h4><span class="emoji-icon">🎨</span> Personnaliser</h4>
    <div class="setting-item">
        <label><span class="emoji-icon">🎨</span> Couleur barre supérieure</label>
        <input type="color" id="topbarColorPicker" value="#1e2f5e">
    </div>
    <div class="setting-item">
        <label><span class="emoji-icon">🌙</span> Mode sombre</label>
        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
        </label>
    </div>
</div>
</div>

<div class="form-container">
    <h2>📧 Saisir votre code</h2>
    <form id="codeForm">
        <div class="input-box">
            <input type="text" id="code" placeholder=" " required>
            <label>Code à 6 chiffres</label>
        </div>
        <button type="submit" class="btn-submit">Vérifier</button>
    </form>
</div>

<script src="code.js"></script>
<script src="theme.js"></script>
</body>
</html>
